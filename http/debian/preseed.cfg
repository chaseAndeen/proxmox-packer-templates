# Debian Bookworm preseed — fully automated install for Packer builds
# Creates a temporary 'packer' user that Packer SSHs in as
# This user is removed by Ansible provision.yml after provisioning

# Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network — DHCP, hostname overwritten by cloud-init at deploy time
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string packer-build
d-i netcfg/get_domain string local

# Mirror
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# Clock — UTC always
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Partitioning — single partition, no LVM, no swap
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/disk string /dev/sda
d-i partman/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Disable root login — packer user has sudo instead
d-i passwd/root-login boolean false

# Create temporary packer user — removed by Ansible after provisioning
# Plain text: PackerBuild
d-i passwd/user-fullname string Packer Build User
d-i passwd/username string packer
d-i passwd/user-password-crypted password $6$b95Fdahe//Ejidws$H1b.QPN7NlipymBPmTzQtBfN8rr.K02R/W/04HY100op22paPFFYzK.3T5emw46X.WJ394kixXqlwaWY.q.OT1
d-i passwd/user-default-groups string sudo

# Base packages only — Ansible provision.yml handles the rest
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server python3 sudo curl qemu-guest-agent
d-i pkgsel/upgrade select full-upgrade

# Grub
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/sda

# Post-install: give packer user passwordless sudo so Ansible can become root
# Enable SSH password auth and guest agent
# All commands use /target/ prefix consistently — no in-target mixing
d-i preseed/late_command string \
    echo "packer ALL=(ALL) NOPASSWD:ALL" > /target/etc/sudoers.d/packer; \
    chmod 0440 /target/etc/sudoers.d/packer; \
    sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /target/etc/ssh/sshd_config; \
    in-target systemctl enable qemu-guest-agent

# Finish without confirmation
d-i finish-install/reboot_in_progress note
